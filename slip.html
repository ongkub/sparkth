<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>แจ้งโอนเงินแทนซอง — Anan & Ong</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
@font-face{
  font-family:'Corinthia';
  src:url('Wedding%20Card/Fonts/Corinthia-Regular.ttf') format('truetype');
  font-weight:400;font-style:normal;font-display:swap;
}
@font-face{
  font-family:'BodoniModa';
  src:url('Wedding%20Card/Fonts/BodoniModa_9pt-Medium.ttf') format('truetype');
  font-weight:500;font-style:normal;font-display:swap;
}
@font-face{
  font-family:'BodoniModa';
  src:url('Wedding%20Card/Fonts/BodoniModa_9pt-SemiBold.ttf') format('truetype');
  font-weight:600;font-style:normal;font-display:swap;
}
@font-face{
  font-family:'ElmsSans';
  src:url('Wedding%20Card/Fonts/ElmsSans-Regular.ttf') format('truetype');
  font-weight:400;font-style:normal;font-display:swap;
}

:root{
  --ivory:#F8F5F0;
  --cream:#F2EDE6;
  --card:#FDFAF6;
  --gold:#B8965A;
  --gold-light:#D4AF78;
  --gold-pale:#EFE0C0;
  --text:#2C2318;
  --muted:#8A7560;
  --border:#DDD0BB;
  --shadow:rgba(44,35,24,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
  height:100%;
  height:100dvh;
  overflow:hidden;
}
body{
  background:var(--ivory);
  font-family:'Noto Sans Thai','Sarabun',sans-serif;
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 40% at 50% 0%,rgba(184,150,90,.08) 0%,transparent 65%),
    radial-gradient(ellipse 40% 30% at 90% 100%,rgba(184,150,90,.05) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

/* ─── Outer wrapper fills viewport ─── */
.wrap{
  position:relative;z-index:1;
  width:100%;max-width:440px;
  height:100%;
  display:flex;flex-direction:column;
  padding:0 18px env(safe-area-inset-bottom,12px);
}

/* ─── Top bar (lang + header inline) ─── */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0 6px;
  flex-shrink:0;
}
.header-logo{
  height:44px;width:auto;
  display:block;
}
.lang-btn{
  background:transparent;
  border:1.5px solid var(--border);
  border-radius:50px;padding:4px 12px;
  font-family:'ElmsSans',sans-serif;
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);cursor:pointer;
  transition:border-color .2s,color .2s;
  flex-shrink:0;
}
.lang-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ─── Couple name + date strip ─── */
.header-text{
  text-align:center;padding:2px 0 8px;flex-shrink:0;
}
.couple-name{
  font-family:'Corinthia',cursive;
  font-size:52px;line-height:1;color:var(--text);
}
.header-meta{
  font-family:'ElmsSans',sans-serif;
  font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--muted);margin-top:2px;
}

/* ─── Divider ─── */
.divider{
  display:flex;align-items:center;gap:8px;
  margin:4px 0 8px;flex-shrink:0;
  color:var(--gold-light);font-size:12px;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-pale));
}
.divider::after{background:linear-gradient(90deg,var(--gold-pale),transparent)}

/* ─── Card fills remaining height ─── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px 20px 20px;
  box-shadow:0 4px 24px var(--shadow);
  position:relative;overflow:hidden;
  flex:1;
  display:flex;flex-direction:column;
  min-height:0;
}
.card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 5%,var(--gold-light) 30%,var(--gold) 50%,var(--gold-light) 70%,transparent 95%);
}
.section-title{
  font-family:'BodoniModa',serif;
  font-size:13px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--gold);text-align:center;margin-bottom:14px;
  flex-shrink:0;
}

/* ─── Form fills card ─── */
#formView{
  display:flex;flex-direction:column;flex:1;min-height:0;
}

/* ─── Field ─── */
.field{margin-bottom:10px;flex-shrink:0}
.field > label{
  display:block;
  font-family:'ElmsSans',sans-serif;
  font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:5px;
}
.field input[type="text"]{
  width:100%;padding:10px 14px;
  background:var(--ivory);
  border:1.5px solid var(--border);border-radius:10px;
  font-family:'Noto Sans Thai','Sarabun',sans-serif;
  font-size:15px;color:var(--text);
  outline:none;transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
.field input[type="text"]:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(184,150,90,.12);
}
.field input[type="text"]::placeholder{color:var(--border)}

/* ─── Side selector ─── */
.side-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.side-option{position:relative}
.side-option input[type="radio"]{position:absolute;opacity:0;width:0;height:0}
.side-option label{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  border:1.5px solid var(--border);border-radius:10px;
  background:var(--ivory);cursor:pointer;
  transition:border-color .2s,background .2s,box-shadow .2s;
  user-select:none;
}
.side-emoji{font-size:20px;line-height:1;flex-shrink:0}
.side-info{display:flex;flex-direction:column;gap:1px}
.side-name{
  font-family:'BodoniModa',serif;
  font-size:13px;font-weight:500;letter-spacing:.3px;color:var(--text);
}
.side-desc{
  font-family:'ElmsSans',sans-serif;
  font-size:8.5px;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);
}
.side-option input[type="radio"]:checked + label{
  border-color:var(--gold);
  background:rgba(184,150,90,.06);
  box-shadow:0 0 0 3px rgba(184,150,90,.12);
}
.side-option input[type="radio"]:checked + label .side-name{color:var(--gold)}
.side-option input[type="radio"]:checked + label .side-desc{color:var(--gold-light)}

/* ─── Upload zone — grows to fill space ─── */
.field.field-upload{flex:1;display:flex;flex-direction:column;min-height:0;margin-bottom:10px}
.field.field-upload > label{flex-shrink:0}
.upload-zone{
  border:2px dashed var(--border);border-radius:10px;
  background:var(--ivory);
  display:flex;align-items:center;justify-content:center;gap:10px;
  cursor:pointer;
  transition:border-color .2s,background .2s;
  position:relative;overflow:hidden;
  flex:1;min-height:56px;
}
.upload-zone:hover,.upload-zone.dragover{
  border-color:var(--gold);background:rgba(184,150,90,.04);
}
.upload-zone input[type="file"]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
}
.upload-icon{font-size:22px;line-height:1;flex-shrink:0}
.upload-label{font-size:13px;color:var(--muted)}
.upload-label strong{color:var(--gold);font-weight:500}
.upload-hint{
  font-family:'ElmsSans',sans-serif;
  font-size:8px;letter-spacing:1px;text-transform:uppercase;
  color:var(--border);margin-top:2px;
}
.preview-wrap{
  display:none;flex:1;min-height:0;
  border-radius:10px;overflow:hidden;
  border:1px solid var(--border);position:relative;
}
.preview-wrap.show{display:block}
.preview-wrap img{width:100%;height:100%;object-fit:contain;background:var(--cream);display:block}
.preview-remove{
  position:absolute;top:8px;right:8px;
  background:rgba(44,35,24,.65);border:none;border-radius:50%;
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;font-size:12px;transition:background .2s;
}
.preview-remove:hover{background:rgba(44,35,24,.88)}

/* ─── Error ─── */
.error-msg{
  font-size:12px;color:#c0392b;
  margin-top:4px;padding:6px 10px;
  background:rgba(192,57,43,.07);border-radius:8px;display:none;
  flex-shrink:0;
}
.error-msg.show{display:block}

/* ─── Submit ─── */
.submit-btn{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 100%);
  border:none;border-radius:12px;
  font-family:'ElmsSans',sans-serif;
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:#fff;cursor:pointer;
  box-shadow:0 4px 16px rgba(184,150,90,.35);
  transition:opacity .2s,transform .15s;
  flex-shrink:0;
}
.submit-btn:hover:not(:disabled){opacity:.92;transform:translateY(-1px)}
.submit-btn:active:not(:disabled){transform:translateY(0)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.btn-spinner{
  display:none;width:16px;height:16px;
  border:2px solid rgba(255,255,255,.4);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;
}
.submit-btn.loading .btn-text{display:none}
.submit-btn.loading .btn-spinner{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Thank you ─── */
.thankyou{
  display:none;flex:1;
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:8px;
}
.thankyou.show{display:flex}
.ty-icon{font-size:48px;margin-bottom:12px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes popIn{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.ty-title{
  font-family:'Corinthia',cursive;
  font-size:60px;color:var(--text);line-height:1;
  margin-bottom:10px;animation:fadeUp .5s .2s both;
}
.ty-sub{font-size:14px;color:var(--muted);line-height:1.8;animation:fadeUp .5s .35s both}
.ty-names{
  font-family:'Corinthia',cursive;
  font-size:36px;color:var(--gold);
  margin-top:12px;animation:fadeUp .5s .5s both;
}
@keyframes fadeUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>
<div class="wrap">

  <!-- Top bar: logo + lang -->
  <div class="top-bar">
    <img class="header-logo" src="img/Wedding_Logo.png" alt="Anan & Ong">
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
  </div>

  <!-- Couple name + date -->
  <div class="header-text">
    <div class="couple-name">Anan &amp; Ong</div>
    <div class="header-meta" id="hMeta">July 3, 2026 · Chatrium Hotel Riverside Bangkok</div>
  </div>

  <!-- Thin divider -->
  <div class="divider">♡</div>

  <!-- Card -->
  <div class="card">

    <!-- Form -->
    <div id="formView">
      <div class="section-title" id="sTitle">แจ้งโอนเงินแทนซอง</div>

      <!-- ชื่อเล่น -->
      <div class="field">
        <label id="lNickname">ชื่อเล่นของคุณ</label>
        <input type="text" id="nickname" placeholder="กรอกชื่อเล่น" autocomplete="off" maxlength="50">
        <div class="error-msg" id="nicknameErr"></div>
      </div>

      <!-- ฝ่าย -->
      <div class="field">
        <label id="lSide">คุณมาในฐานะ</label>
        <div class="side-grid">
          <div class="side-option">
            <input type="radio" id="sideBride" name="side" value="bride">
            <label for="sideBride">
              <span class="side-emoji">👰</span>
              <span class="side-info">
                <span class="side-name">Anan</span>
                <span class="side-desc" id="descBride">ฝ่ายเจ้าสาว</span>
              </span>
            </label>
          </div>
          <div class="side-option">
            <input type="radio" id="sideGroom" name="side" value="groom">
            <label for="sideGroom">
              <span class="side-emoji">🤵</span>
              <span class="side-info">
                <span class="side-name">Ong</span>
                <span class="side-desc" id="descGroom">ฝ่ายเจ้าบ่าว</span>
              </span>
            </label>
          </div>
        </div>
        <div class="error-msg" id="sideErr"></div>
      </div>

      <!-- สลิป -->
      <div class="field field-upload">
        <label id="lSlip">สลิปโอนเงิน</label>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="slipFile" accept="image/*">
          <span class="upload-icon">🧾</span>
          <div>
            <div class="upload-label"><strong id="uploadStrong">แตะเพื่อเลือกรูปสลิป</strong></div>
            <div class="upload-hint">JPG · PNG · MAX 5 MB</div>
          </div>
        </div>
        <div class="preview-wrap" id="previewWrap">
          <img id="previewImg" src="" alt="slip preview">
          <button class="preview-remove" id="removeBtn" type="button">✕</button>
        </div>
        <div class="error-msg" id="slipErr"></div>
      </div>

      <div class="error-msg" id="submitErr"></div>

      <button class="submit-btn" id="submitBtn" type="button">
        <span class="btn-text" id="btnText">ยืนยันการโอนเงิน</span>
        <span class="btn-spinner"></span>
      </button>
    </div>

    <!-- Thank you -->
    <div class="thankyou" id="thankYou">
      <div class="ty-icon">💌</div>
      <div class="ty-title" id="tyTitle">ขอบคุณ</div>
      <div class="ty-sub" id="tySub">
        ได้รับสลิปเรียบร้อยแล้วค่ะ<br>
        ขอบคุณสำหรับความรักและน้ำใจนะคะ<br>
        เจอกันในงานเร็วๆ นี้เลย ✨
      </div>
      <div class="ty-names">Anan &amp; Ong</div>
    </div>

  </div>

</div>
<script>
const API = 'https://sparkth-production.up.railway.app/slip';
const MAX_SIZE = 5 * 1024 * 1024;

const T = {
  th:{
    langBtn:'EN', sTitle:'แจ้งโอนเงินแทนซอง',
    lNickname:'ชื่อเล่นของคุณ', placeholder:'กรอกชื่อเล่น',
    lSide:'คุณมาในฐานะ', descBride:'ฝ่ายเจ้าสาว', descGroom:'ฝ่ายเจ้าบ่าว',
    lSlip:'สลิปโอนเงิน', uploadStrong:'แตะเพื่อเลือกรูปสลิป',
    btnText:'ยืนยันการโอนเงิน',
    errNickname:'กรุณากรอกชื่อเล่นก่อนนะคะ',
    errSide:'กรุณาเลือกว่ามาในฝ่ายไหนนะคะ',
    errSlip:'กรุณาอัปโหลดสลิปโอนเงินด้วยนะคะ',
    errSize:'ไฟล์ใหญ่เกิน 5MB กรุณาเลือกรูปใหม่ค่ะ',
    errServer:'เกิดข้อผิดพลาด กรุณาลองอีกครั้งค่ะ 🙏',
    tyTitle:'ขอบคุณ',
    tySub:'ได้รับสลิปเรียบร้อยแล้วค่ะ<br>ขอบคุณสำหรับความรักและน้ำใจนะคะ<br>เจอกันในงานเร็วๆ นี้เลย ✨',
    hMeta:'July 3, 2026 · Chatrium Hotel Riverside Bangkok',
  },
  en:{
    langBtn:'TH', sTitle:'Gift Transfer Notification',
    lNickname:'Your Nickname', placeholder:'Enter your nickname',
    lSide:"I'm a guest of", descBride:"Bride's side", descGroom:"Groom's side",
    lSlip:'Transfer Slip', uploadStrong:'Tap to upload your slip',
    btnText:'Confirm Transfer',
    errNickname:'Please enter your nickname.',
    errSide:"Please select which side you're from.",
    errSlip:'Please upload your transfer slip.',
    errSize:'File exceeds 5MB. Please choose a smaller image.',
    errServer:'Something went wrong. Please try again. 🙏',
    tyTitle:'Thank You',
    tySub:'Your slip has been received!<br>We truly appreciate your love and kindness.<br>See you at the wedding! ✨',
    hMeta:'July 3, 2026 · Chatrium Hotel Riverside Bangkok',
  }
};

let lang = 'th';

function applyLang(){
  const t = T[lang];
  document.getElementById('langBtn').textContent     = t.langBtn;
  document.getElementById('sTitle').textContent      = t.sTitle;
  document.getElementById('lNickname').textContent   = t.lNickname;
  document.getElementById('nickname').placeholder    = t.placeholder;
  document.getElementById('lSide').textContent       = t.lSide;
  document.getElementById('descBride').textContent   = t.descBride;
  document.getElementById('descGroom').textContent   = t.descGroom;
  document.getElementById('lSlip').textContent       = t.lSlip;
  document.getElementById('uploadStrong').textContent= t.uploadStrong;
  document.getElementById('btnText').textContent     = t.btnText;
  document.getElementById('tyTitle').textContent     = t.tyTitle;
  document.getElementById('tySub').innerHTML         = t.tySub;
  document.getElementById('hMeta').textContent       = t.hMeta;
}
function toggleLang(){ lang = lang==='th'?'en':'th'; applyLang(); }
applyLang();

const nicknameEl  = document.getElementById('nickname');
const slipFileEl  = document.getElementById('slipFile');
const uploadZone  = document.getElementById('uploadZone');
const previewWrap = document.getElementById('previewWrap');
const previewImg  = document.getElementById('previewImg');
const removeBtn   = document.getElementById('removeBtn');
const submitBtn   = document.getElementById('submitBtn');
const formView    = document.getElementById('formView');
const thankYou    = document.getElementById('thankYou');
const nicknameErr = document.getElementById('nicknameErr');
const sideErr     = document.getElementById('sideErr');
const slipErr     = document.getElementById('slipErr');
const submitErr   = document.getElementById('submitErr');

let slipDataUrl = null, slipMime = null;

slipFileEl.addEventListener('change', ()=>{
  const file = slipFileEl.files[0]; if(!file) return;
  if(file.size > MAX_SIZE){ showErr(slipErr, T[lang].errSize); slipFileEl.value=''; return; }
  hideErr(slipErr);
  const reader = new FileReader();
  reader.onload = e => {
    slipDataUrl = e.target.result; slipMime = file.type||'image/jpeg';
    previewImg.src = slipDataUrl;
    uploadZone.style.display = 'none';
    previewWrap.classList.add('show');
  };
  reader.readAsDataURL(file);
});

uploadZone.addEventListener('dragover', e=>{ e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', ()=> uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e=>{
  e.preventDefault(); uploadZone.classList.remove('dragover');
  const file = e.dataTransfer?.files?.[0]; if(!file) return;
  const dt = new DataTransfer(); dt.items.add(file);
  slipFileEl.files = dt.files; slipFileEl.dispatchEvent(new Event('change'));
});

removeBtn.addEventListener('click', ()=>{
  slipDataUrl = null; slipMime = null; slipFileEl.value = ''; previewImg.src = '';
  previewWrap.classList.remove('show');
  uploadZone.style.display = '';
});

submitBtn.addEventListener('click', async ()=>{
  const t = T[lang]; let valid = true;
  if(!nicknameEl.value.trim()){ showErr(nicknameErr, t.errNickname); valid=false; } else hideErr(nicknameErr);
  const side = document.querySelector('input[name="side"]:checked')?.value;
  if(!side){ showErr(sideErr, t.errSide); valid=false; } else hideErr(sideErr);
  if(!slipDataUrl){ showErr(slipErr, t.errSlip); valid=false; } else hideErr(slipErr);
  if(!valid) return;
  setLoading(true); hideErr(submitErr);
  try{
    const base64 = slipDataUrl.split(',')[1];
    const res = await fetch(API,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ nickname: nicknameEl.value.trim(), side, slipBase64: base64, slipMime })
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if(!json.success) throw new Error(json.error||'server error');
    formView.style.display = 'none';
    thankYou.classList.add('show');
  } catch(err){
    console.error(err); showErr(submitErr, T[lang].errServer);
  } finally{ setLoading(false); }
});

function setLoading(on){ submitBtn.disabled=on; submitBtn.classList.toggle('loading',on); }
function showErr(el, msg){ if(msg) el.textContent=msg; el.classList.add('show'); }
function hideErr(el){ el.classList.remove('show'); }
</script>
</body>
</html>
