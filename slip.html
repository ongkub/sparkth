<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>แจ้งโอนเงินแทนซอง — An-an & Ong</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
@font-face{
  font-family:'Corinthia';
  src:url('Wedding%20Card/Fonts/Corinthia-Regular.ttf') format('truetype');
  font-weight:400;font-style:normal;font-display:swap;
}
@font-face{
  font-family:'BodoniModa';
  src:url('Wedding%20Card/Fonts/BodoniModa_9pt-Medium.ttf') format('truetype');
  font-weight:500;font-style:normal;font-display:swap;
}
@font-face{
  font-family:'BodoniModa';
  src:url('Wedding%20Card/Fonts/BodoniModa_9pt-SemiBold.ttf') format('truetype');
  font-weight:600;font-style:normal;font-display:swap;
}
@font-face{
  font-family:'ElmsSans';
  src:url('Wedding%20Card/Fonts/ElmsSans-Regular.ttf') format('truetype');
  font-weight:400;font-style:normal;font-display:swap;
}

:root{
  --ivory:#F8F5F0;
  --cream:#F2EDE6;
  --card:#FDFAF6;
  --gold:#B8965A;
  --gold-light:#D4AF78;
  --gold-pale:#EFE0C0;
  --text:#2C2318;
  --muted:#8A7560;
  --border:#DDD0BB;
  --shadow:rgba(44,35,24,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  background:var(--ivory);
  font-family:'Noto Sans Thai','Sarabun',sans-serif;
  color:var(--text);min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom,32px);
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% -10%,rgba(184,150,90,.07) 0%,transparent 65%),
    radial-gradient(ellipse 50% 40% at 10% 100%,rgba(184,150,90,.04) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 80%,rgba(184,150,90,.04) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

.wrap{position:relative;z-index:1;max-width:440px;margin:0 auto;padding:0 20px 40px}

/* ─── Lang toggle ─── */
.lang-bar{
  display:flex;justify-content:flex-end;padding-top:16px;
}
.lang-btn{
  background:transparent;
  border:1.5px solid var(--border);
  border-radius:50px;padding:5px 14px;
  font-family:'ElmsSans',sans-serif;
  font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);cursor:pointer;
  transition:border-color .2s,color .2s;
}
.lang-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ─── Header ─── */
.header{text-align:center;padding:28px 0 16px}
.header-logo{
  width:150px;height:auto;
  margin:0 auto 14px;display:block;
}
.couple-name{
  font-family:'Corinthia',cursive;
  font-size:64px;line-height:1;color:var(--text);
  margin-bottom:10px;
}
.header-sub{
  font-family:'ElmsSans',sans-serif;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--muted);margin-bottom:3px;
}
.header-date{
  font-family:'BodoniModa',serif;
  font-size:11px;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);font-weight:500;
}

.divider-ornament{
  display:flex;align-items:center;justify-content:center;
  gap:10px;margin:20px 0 24px;
  font-family:'Corinthia',cursive;font-size:22px;color:var(--gold-light);
}
.divider-ornament::before,.divider-ornament::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-pale));
}
.divider-ornament::after{background:linear-gradient(90deg,var(--gold-pale),transparent)}

/* ─── Card ─── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:28px 24px 32px;
  box-shadow:0 4px 24px var(--shadow),0 1px 4px rgba(184,150,90,.06);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:2.5px;
  background:linear-gradient(90deg,transparent 5%,var(--gold-light) 30%,var(--gold) 50%,var(--gold-light) 70%,transparent 95%);
}
.section-title{
  font-family:'BodoniModa',serif;
  font-size:16px;font-weight:500;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);text-align:center;margin-bottom:24px;
}

/* ─── Field ─── */
.field{margin-bottom:20px}
.field > label{
  display:block;
  font-family:'ElmsSans',sans-serif;
  font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;
}
.field input[type="text"]{
  width:100%;padding:13px 16px;
  background:var(--ivory);
  border:1.5px solid var(--border);border-radius:10px;
  font-family:'Noto Sans Thai','Sarabun',sans-serif;
  font-size:16px;color:var(--text);
  outline:none;transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
.field input[type="text"]:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(184,150,90,.12);
}
.field input[type="text"]::placeholder{color:var(--border);font-size:15px}

/* ─── Side selector ─── */
.side-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.side-option{position:relative}
.side-option input[type="radio"]{position:absolute;opacity:0;width:0;height:0}
.side-option label{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;padding:14px 8px;
  border:1.5px solid var(--border);border-radius:12px;
  background:var(--ivory);cursor:pointer;
  transition:border-color .2s,background .2s,box-shadow .2s;
  user-select:none;
}
.side-emoji{font-size:26px;line-height:1}
.side-name{
  font-family:'BodoniModa',serif;
  font-size:14px;font-weight:500;letter-spacing:.5px;color:var(--text);
}
.side-desc{
  font-family:'ElmsSans',sans-serif;
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);
}
.side-option input[type="radio"]:checked + label{
  border-color:var(--gold);
  background:rgba(184,150,90,.06);
  box-shadow:0 0 0 3px rgba(184,150,90,.12);
}
.side-option input[type="radio"]:checked + label .side-name{color:var(--gold)}
.side-option input[type="radio"]:checked + label .side-desc{color:var(--gold-light)}

/* ─── Upload zone ─── */
.upload-zone{
  border:2px dashed var(--border);border-radius:12px;
  background:var(--ivory);padding:28px 16px;
  text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;
  position:relative;overflow:hidden;
}
.upload-zone:hover,.upload-zone.dragover{
  border-color:var(--gold);background:rgba(184,150,90,.04);
}
.upload-zone input[type="file"]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
}
.upload-icon{font-size:30px;margin-bottom:8px;display:block}
.upload-label{font-size:14px;color:var(--muted);line-height:1.5}
.upload-label strong{color:var(--gold);font-weight:500}
.upload-hint{
  font-family:'ElmsSans',sans-serif;
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--border);margin-top:6px;
}
.preview-wrap{
  display:none;margin-top:12px;
  border-radius:10px;overflow:hidden;
  border:1px solid var(--border);position:relative;
}
.preview-wrap.show{display:block}
.preview-wrap img{width:100%;max-height:360px;object-fit:contain;background:var(--cream);display:block}
.preview-remove{
  position:absolute;top:8px;right:8px;
  background:rgba(44,35,24,.65);border:none;border-radius:50%;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;font-size:13px;transition:background .2s;
}
.preview-remove:hover{background:rgba(44,35,24,.88)}

/* ─── Submit ─── */
.submit-btn{
  width:100%;padding:15px;margin-top:8px;
  background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 100%);
  border:none;border-radius:12px;
  font-family:'ElmsSans',sans-serif;
  font-size:12px;letter-spacing:3px;text-transform:uppercase;
  color:#fff;cursor:pointer;
  box-shadow:0 4px 16px rgba(184,150,90,.35);
  transition:opacity .2s,transform .15s,box-shadow .2s;
}
.submit-btn:hover:not(:disabled){opacity:.92;transform:translateY(-1px);box-shadow:0 6px 20px rgba(184,150,90,.4)}
.submit-btn:active:not(:disabled){transform:translateY(0)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.btn-spinner{
  display:none;width:18px;height:18px;
  border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;
}
.submit-btn.loading .btn-text{display:none}
.submit-btn.loading .btn-spinner{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Error ─── */
.error-msg{
  font-size:13px;color:#c0392b;
  margin-top:6px;padding:8px 12px;
  background:rgba(192,57,43,.07);border-radius:8px;display:none;
}
.error-msg.show{display:block}

/* ─── Thank you ─── */
.thankyou{display:none;text-align:center;padding:8px}
.thankyou.show{display:block}
.ty-icon{font-size:52px;margin-bottom:14px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes popIn{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.ty-title{
  font-family:'Corinthia',cursive;
  font-size:64px;color:var(--text);line-height:1.1;
  margin-bottom:12px;animation:fadeUp .5s .2s both;
}
.ty-sub{font-size:14px;color:var(--muted);line-height:1.85;animation:fadeUp .5s .35s both}
.ty-names{
  font-family:'Corinthia',cursive;
  font-size:38px;color:var(--gold);
  margin-top:14px;animation:fadeUp .5s .5s both;
}
@keyframes fadeUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ─── Footer ─── */
.footer{
  text-align:center;margin-top:28px;
  font-family:'ElmsSans',sans-serif;
  font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--border);
}
</style>
</head>
<body>
<div class="wrap">

  <!-- Lang toggle -->
  <div class="lang-bar">
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
  </div>

  <!-- Header -->
  <div class="header">
    <img class="header-logo" src="img/weddinglogo.png" alt="An-an & Ong">
    <div class="couple-name">Anan &amp; Ong</div>
    <div class="header-sub" id="hSub">July 3, 2026 · Friday</div>
    <div class="header-date" id="hDate">Chatrium Hotel Riverside Bangkok</div>
  </div>

  <div class="divider-ornament">♡</div>

  <!-- Card -->
  <div class="card">

    <!-- Form -->
    <div id="formView">
      <div class="section-title" id="sTitle">แจ้งโอนเงินแทนซอง</div>

      <!-- ชื่อเล่น -->
      <div class="field">
        <label id="lNickname">ชื่อเล่นของคุณ</label>
        <input type="text" id="nickname" placeholder="กรอกชื่อเล่น" autocomplete="off" maxlength="50">
        <div class="error-msg" id="nicknameErr"></div>
      </div>

      <!-- ฝ่าย -->
      <div class="field">
        <label id="lSide">คุณมาในฐานะ</label>
        <div class="side-grid">
          <div class="side-option">
            <input type="radio" id="sideBride" name="side" value="bride">
            <label for="sideBride">
              <span class="side-emoji">👰</span>
              <span class="side-name">Anan</span>
              <span class="side-desc" id="descBride">ฝ่ายเจ้าสาว</span>
            </label>
          </div>
          <div class="side-option">
            <input type="radio" id="sideGroom" name="side" value="groom">
            <label for="sideGroom">
              <span class="side-emoji">🤵</span>
              <span class="side-name">Ong</span>
              <span class="side-desc" id="descGroom">ฝ่ายเจ้าบ่าว</span>
            </label>
          </div>
        </div>
        <div class="error-msg" id="sideErr"></div>
      </div>

      <!-- สลิป -->
      <div class="field">
        <label id="lSlip">สลิปโอนเงิน</label>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="slipFile" accept="image/*">
          <span class="upload-icon">🧾</span>
          <div class="upload-label" id="uploadLabel">
            <strong id="uploadStrong">แตะเพื่อเลือกรูปสลิป</strong>
          </div>
          <div class="upload-hint">JPG · PNG · MAX 5 MB</div>
        </div>
        <div class="preview-wrap" id="previewWrap">
          <img id="previewImg" src="" alt="slip preview">
          <button class="preview-remove" id="removeBtn" type="button">✕</button>
        </div>
        <div class="error-msg" id="slipErr"></div>
      </div>

      <div class="error-msg" id="submitErr"></div>

      <button class="submit-btn" id="submitBtn" type="button">
        <span class="btn-text" id="btnText">ยืนยันการโอนเงิน</span>
        <span class="btn-spinner"></span>
      </button>
    </div>

    <!-- Thank you -->
    <div class="thankyou" id="thankYou">
      <div class="ty-icon">💌</div>
      <div class="ty-title" id="tyTitle">ขอบคุณ</div>
      <div class="ty-sub" id="tySub">
        ได้รับสลิปเรียบร้อยแล้วค่ะ<br>
        ขอบคุณสำหรับความรักและน้ำใจนะคะ<br>
        เจอกันในงานเร็วๆ นี้เลย ✨
      </div>
      <div class="ty-names">Anan &amp; Ong</div>
    </div>

  </div>

  <div class="footer">With love · July 3, 2026</div>
</div>

<script>
const API = 'https://sparkth-production.up.railway.app/slip';
const MAX_SIZE = 5 * 1024 * 1024;

/* ─── i18n ─── */
const T = {
  th: {
    langBtn:    'EN',
    sTitle:     'แจ้งโอนเงินแทนซอง',
    lNickname:  'ชื่อเล่นของคุณ',
    placeholder:'กรอกชื่อเล่น',
    lSide:      'คุณมาในฐานะ',
    descBride:  'ฝ่ายเจ้าสาว',
    descGroom:  'ฝ่ายเจ้าบ่าว',
    lSlip:      'สลิปโอนเงิน',
    uploadStrong:'แตะเพื่อเลือกรูปสลิป',
    btnText:    'ยืนยันการโอนเงิน',
    errNickname:'กรุณากรอกชื่อเล่นก่อนนะคะ',
    errSide:    'กรุณาเลือกว่ามาในฝ่ายไหนนะคะ',
    errSlip:    'กรุณาอัปโหลดสลิปโอนเงินด้วยนะคะ',
    errSize:    'ไฟล์ใหญ่เกิน 5MB กรุณาเลือกรูปใหม่ค่ะ',
    errServer:  'เกิดข้อผิดพลาด กรุณาลองอีกครั้งค่ะ 🙏',
    tyTitle:    'ขอบคุณ',
    tySub:      'ได้รับสลิปเรียบร้อยแล้วค่ะ<br>ขอบคุณสำหรับความรักและน้ำใจนะคะ<br>เจอกันในงานเร็วๆ นี้เลย ✨',
  },
  en: {
    langBtn:    'TH',
    sTitle:     'Gift Transfer Notification',
    lNickname:  'Your Nickname',
    placeholder:'Enter your nickname',
    lSide:      "I'm a guest of",
    descBride:  "Bride's side",
    descGroom:  "Groom's side",
    lSlip:      'Transfer Slip',
    uploadStrong:'Tap to upload your slip',
    btnText:    'Confirm Transfer',
    errNickname:'Please enter your nickname.',
    errSide:    "Please select which side you're from.",
    errSlip:    'Please upload your transfer slip.',
    errSize:    'File exceeds 5MB. Please choose a smaller image.',
    errServer:  'Something went wrong. Please try again. 🙏',
    tyTitle:    'Thank You',
    tySub:      'Your slip has been received!<br>We truly appreciate your love and kindness.<br>See you at the wedding! ✨',
  }
};

let lang = 'th';

function applyLang() {
  const t = T[lang];
  document.getElementById('langBtn').textContent    = t.langBtn;
  document.getElementById('sTitle').textContent     = t.sTitle;
  document.getElementById('lNickname').textContent  = t.lNickname;
  document.getElementById('nickname').placeholder   = t.placeholder;
  document.getElementById('lSide').textContent      = t.lSide;
  document.getElementById('descBride').textContent  = t.descBride;
  document.getElementById('descGroom').textContent  = t.descGroom;
  document.getElementById('lSlip').textContent      = t.lSlip;
  document.getElementById('uploadStrong').textContent = t.uploadStrong;
  document.getElementById('btnText').textContent    = t.btnText;
  document.getElementById('tyTitle').textContent    = t.tyTitle;
  document.getElementById('tySub').innerHTML        = t.tySub;
}

function toggleLang() {
  lang = lang === 'th' ? 'en' : 'th';
  applyLang();
}

applyLang();

/* ─── Upload logic ─── */
const nicknameEl  = document.getElementById('nickname');
const slipFileEl  = document.getElementById('slipFile');
const uploadZone  = document.getElementById('uploadZone');
const previewWrap = document.getElementById('previewWrap');
const previewImg  = document.getElementById('previewImg');
const removeBtn   = document.getElementById('removeBtn');
const submitBtn   = document.getElementById('submitBtn');
const formView    = document.getElementById('formView');
const thankYou    = document.getElementById('thankYou');
const nicknameErr = document.getElementById('nicknameErr');
const sideErr     = document.getElementById('sideErr');
const slipErr     = document.getElementById('slipErr');
const submitErr   = document.getElementById('submitErr');

let slipDataUrl = null;
let slipMime    = null;

slipFileEl.addEventListener('change', () => {
  const file = slipFileEl.files[0];
  if (!file) return;
  if (file.size > MAX_SIZE) {
    showErr(slipErr, T[lang].errSize); slipFileEl.value = ''; return;
  }
  hideErr(slipErr);
  const reader = new FileReader();
  reader.onload = e => {
    slipDataUrl = e.target.result;
    slipMime = file.type || 'image/jpeg';
    previewImg.src = slipDataUrl;
    previewWrap.classList.add('show');
  };
  reader.readAsDataURL(file);
});

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('dragover');
  const file = e.dataTransfer?.files?.[0];
  if (!file) return;
  const dt = new DataTransfer(); dt.items.add(file);
  slipFileEl.files = dt.files;
  slipFileEl.dispatchEvent(new Event('change'));
});

removeBtn.addEventListener('click', () => {
  slipDataUrl = null; slipMime = null;
  slipFileEl.value = ''; previewImg.src = '';
  previewWrap.classList.remove('show');
});

submitBtn.addEventListener('click', async () => {
  const t = T[lang];
  let valid = true;

  if (!nicknameEl.value.trim()) { showErr(nicknameErr, t.errNickname); valid = false; }
  else { hideErr(nicknameErr); }

  const side = document.querySelector('input[name="side"]:checked')?.value;
  if (!side) { showErr(sideErr, t.errSide); valid = false; }
  else { hideErr(sideErr); }

  if (!slipDataUrl) { showErr(slipErr, t.errSlip); valid = false; }
  else { hideErr(slipErr); }

  if (!valid) return;

  setLoading(true); hideErr(submitErr);

  try {
    const base64 = slipDataUrl.split(',')[1];
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname: nicknameEl.value.trim(), side, slipBase64: base64, slipMime })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'server error');
    formView.style.display = 'none';
    thankYou.classList.add('show');
  } catch (err) {
    console.error(err);
    showErr(submitErr, T[lang].errServer);
  } finally {
    setLoading(false);
  }
});

function setLoading(on) {
  submitBtn.disabled = on;
  submitBtn.classList.toggle('loading', on);
}
function showErr(el, msg) { if (msg) el.textContent = msg; el.classList.add('show'); }
function hideErr(el) { el.classList.remove('show'); }
</script>
</body>
</html>
