<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>แจ้งการโอนเงิน — An-An & Ong</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>

.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24}
.file-upload-dashed{
  background-image:url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='12' ry='12' stroke='%23DDD0BB' stroke-width='2' stroke-dasharray='8%2c 8' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
  border-radius:12px;
}
.file-upload-dashed:hover{
  background-image:url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='12' ry='12' stroke='%23B8965A' stroke-width='2' stroke-dasharray='8%2c 8' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
}
</style>
<script>
tailwind.config={
  theme:{
    extend:{
      colors:{
        ivory:'#F8F5F0',cream:'#F2EDE6',card:'#FDFAF6',
        gold:'#B8965A','gold-dark':'#9A7840','gold-light':'#D4AF78','gold-pale':'#EFE0C0',
        'wtext':'#2C2318',muted:'#8A7560',border:'#DDD0BB',success:'#5A8A5A',
      },
      fontFamily:{
        corinthia:['Corinthia','cursive'],
        bodoni:['BodoniModa','serif'],
        elms:['ElmsSans','sans-serif'],
        thai:["'Noto Sans Thai'",'Sarabun','sans-serif'],
      },
    }
  }
}
</script>
</head>
<body class="bg-ivory min-h-dvh font-thai text-wtext flex flex-col items-center"
      style="background-image:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(184,150,90,.09) 0%,transparent 60%)">

<div class="w-full max-w-[480px] flex flex-col min-h-dvh px-5
            pt-[max(12px,env(safe-area-inset-top))]
            pb-[max(12px,env(safe-area-inset-bottom))]">

  <!-- ── Header ── -->
  <header class="flex items-center justify-between mb-5">
    <div class="flex items-center gap-2">
      <img src="img/Wedding_Logo.png" alt="" class="h-7 w-auto opacity-80" onerror="this.style.display='none'">
      <span class="font-corinthia text-2xl leading-none text-muted" style="line-height:1.4">An-An &amp; Ong</span>
    </div>
    <button onclick="toggleLang()" id="langBtn"
      class="px-4 py-1.5 rounded-full border border-border font-elms text-[10px] tracking-widest uppercase text-muted hover:border-gold hover:text-gold transition-colors">
      EN
    </button>
  </header>

  <!-- ── Task headline ── -->
  <div class="mb-5">
    <h1 id="taskTitle" class="font-bodoni font-semibold text-[26px] leading-tight text-wtext mb-1">
      แจ้งการโอนเงิน
    </h1>
    <p id="taskSub" class="font-elms text-[9px] tracking-[.2em] uppercase text-gold">
      July 3, 2026 · Chatrium Hotel Riverside Bangkok
    </p>
  </div>

  <!-- ── Card ── -->
  <div class="flex-1 flex flex-col gap-0">
    <div class="bg-card rounded-xl border border-border relative overflow-hidden
                shadow-[0_10px_20px_-5px_rgba(113,88,39,0.10)] p-6 space-y-6">

      <!-- gold top line -->
      <div class="absolute top-0 left-0 right-0 h-[2.5px]"
           style="background:linear-gradient(90deg,transparent 5%,#D4AF78 30%,#B8965A 50%,#D4AF78 70%,transparent 95%)"></div>

      <!-- 1. ชื่อเล่น -->
      <div>
        <label id="lNickname" class="block font-thai font-semibold text-[15px] text-wtext mb-2">
          ชื่อเล่นของคุณ
        </label>
        <input id="nickname" type="text" autocomplete="off" maxlength="50"
          class="w-full bg-ivory border border-border rounded-lg px-4 py-3 font-thai text-[15px] text-wtext
                 placeholder:text-border outline-none
                 focus:border-gold focus:ring-2 focus:ring-gold/20 transition-colors"
          placeholder="กรอกชื่อเล่น">
        <p id="nicknameErr" class="hidden mt-2 text-[13px] text-red-600 bg-red-50 rounded-lg px-3 py-2"></p>
      </div>

      <!-- 2. ฝั่ง -->
      <div>
        <label id="lSide" class="block font-thai font-semibold text-[15px] text-wtext mb-3">
          คุณเป็นแขกฝ่าย
        </label>
        <div class="grid grid-cols-2 gap-3">
          <label class="relative cursor-pointer">
            <input type="radio" name="side" value="bride" class="peer sr-only">
            <div class="flex items-center gap-3 p-3.5 rounded-xl border border-border bg-ivory
                        peer-checked:border-gold peer-checked:bg-gold/5 peer-checked:ring-2 peer-checked:ring-gold/20
                        transition-all relative">
              <span class="text-xl">👰</span>
              <div>
                <div class="font-bodoni font-medium text-[14px] text-wtext peer-checked:text-gold">An-An</div>
                <div id="descBride" class="font-elms text-[9px] tracking-wider uppercase text-muted">เจ้าสาว</div>
              </div>
              <!-- checkmark -->
              <span class="absolute top-2 right-2.5 hidden peer-checked:flex
                           w-4 h-4 bg-gold rounded-full items-center justify-center text-white text-[9px] font-bold">✓</span>
            </div>
          </label>
          <label class="relative cursor-pointer">
            <input type="radio" name="side" value="groom" class="peer sr-only">
            <div class="flex items-center gap-3 p-3.5 rounded-xl border border-border bg-ivory
                        peer-checked:border-gold peer-checked:bg-gold/5 peer-checked:ring-2 peer-checked:ring-gold/20
                        transition-all relative">
              <span class="text-xl">🤵</span>
              <div>
                <div class="font-bodoni font-medium text-[14px] text-wtext">Ong</div>
                <div id="descGroom" class="font-elms text-[9px] tracking-wider uppercase text-muted">เจ้าบ่าว</div>
              </div>
              <span class="absolute top-2 right-2.5 hidden peer-checked:flex
                           w-4 h-4 bg-gold rounded-full items-center justify-center text-white text-[9px] font-bold">✓</span>
            </div>
          </label>
        </div>
        <p id="sideErr" class="hidden mt-2 text-[13px] text-red-600 bg-red-50 rounded-lg px-3 py-2"></p>
      </div>

      <!-- divider -->
      <div class="border-t border-border/60"></div>

      <!-- 3. Upload -->
      <div>
        <label id="lSlip" class="block font-thai font-semibold text-[15px] text-wtext mb-3">
          อัปโหลดสลิปโอนเงิน
        </label>

        <!-- Upload zone -->
        <div id="uploadZone"
          class="file-upload-dashed p-8 flex flex-col items-center justify-center text-center cursor-pointer
                 hover:bg-gold/[.03] transition-colors group relative">
          <input type="file" id="slipFile" accept="image/*"
                 class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
          <div class="mb-3 w-14 h-14 rounded-full bg-gold-pale flex items-center justify-center
                      group-hover:scale-110 transition-transform">
            <span class="material-symbols-outlined text-gold text-3xl"
                  style="font-variation-settings:'FILL' 1">cloud_upload</span>
          </div>
          <p id="uploadPrimary" class="font-thai font-semibold text-[15px] text-wtext mb-1">
            อัปโหลดสลิปการโอนเงิน
          </p>
          <p id="uploadSecondary" class="font-thai text-[13px] text-muted mb-3">
            ลากไฟล์มาวาง หรือกดเลือกไฟล์
          </p>
          <div class="flex items-center gap-2 font-elms text-[9px] tracking-widest uppercase text-border">
            <span>JPG</span><span class="w-1 h-1 rounded-full bg-border"></span>
            <span>PNG</span><span class="w-1 h-1 rounded-full bg-border"></span>
            <span>สูงสุด 5MB</span>
          </div>
        </div>

        <!-- Preview after upload -->
        <div id="previewInfo"
          class="hidden p-6 flex-col items-center justify-center text-center
                 rounded-xl border border-success/30 bg-success/5">
          <div class="text-3xl mb-2">✅</div>
          <p id="previewName" class="font-thai font-semibold text-[14px] text-success break-all max-w-full"></p>
          <p id="previewSize" class="font-thai text-[12px] text-muted mt-1"></p>
          <button id="changeBtn" type="button"
            class="mt-3 font-elms text-[9px] tracking-widest uppercase text-gold underline underline-offset-2">
            เปลี่ยนไฟล์
          </button>
        </div>

        <p id="slipErr" class="hidden mt-2 text-[13px] text-red-600 bg-red-50 rounded-lg px-3 py-2"></p>
      </div>

      <p id="submitErr" class="hidden text-[13px] text-red-600 bg-red-50 rounded-lg px-3 py-2"></p>

      <!-- Thank you (replaces card content) -->
      <div id="thankYou"
        class="hidden flex-col items-center justify-center text-center py-8 gap-3">
        <div class="text-5xl" style="animation:popIn .5s cubic-bezier(.34,1.56,.64,1) forwards">💌</div>
        <div id="tyTitle" class="font-corinthia text-[58px] leading-none text-wtext mt-2"
             style="animation:fadeUp .5s .2s both">ขอบคุณ</div>
        <p id="tySub" class="font-thai text-[14px] text-muted leading-relaxed"
           style="animation:fadeUp .5s .35s both">
          ได้รับสลิปเรียบร้อยแล้วค่ะ<br>ขอบคุณสำหรับความรักและน้ำใจ<br>เจอกันในงานเร็วๆ นี้เลย ✨
        </p>
        <div class="font-corinthia text-[36px] text-gold mt-1"
             style="animation:fadeUp .5s .5s both">An-An &amp; Ong</div>
      </div>

    </div><!-- /card -->
  </div>

  <!-- ── CTA ── -->
  <div class="mt-4">
    <button id="submitBtn" type="button"
      class="w-full min-h-[54px] rounded-xl font-thai font-semibold text-[16px] text-white
             flex items-center justify-center gap-2
             transition-all active:scale-[.98]
             disabled:opacity-50 disabled:cursor-not-allowed"
      style="background:linear-gradient(135deg,#D4AF78 0%,#9A7840 100%);
             box-shadow:0 6px 20px rgba(154,120,64,.40),0 2px 6px rgba(154,120,64,.20)">
      <span id="btnText">ยืนยันการโอนเงิน</span>
      <span id="btnSpinner" class="hidden w-5 h-5 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>
    </button>
  </div>

</div><!-- /wrap -->

<style>
@keyframes popIn{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
/* peer-checked sibling trick */
label:has(input[type=radio]:checked) .hidden-check{display:flex}
</style>

<script>
const API='https://sparkth-production.up.railway.app/slip';
const LIFF_ID=localStorage.getItem('weddingSlipLiffId')||'2006674119-vpB15mY0';
const MAX_SIZE=5*1024*1024;
const T={
  th:{langBtn:'EN',taskTitle:'แจ้งการโอนเงิน',taskSub:'July 3, 2026 · Chatrium Hotel Riverside Bangkok',lNickname:'ชื่อเล่นของคุณ',placeholder:'กรอกชื่อเล่น',lSide:'คุณเป็นแขกฝ่าย',descBride:'เจ้าสาว',descGroom:'เจ้าบ่าว',lSlip:'อัปโหลดสลิปโอนเงิน',uploadPrimary:'อัปโหลดสลิปการโอนเงิน',uploadSecondary:'ลากไฟล์มาวาง หรือกดเลือกไฟล์',changeBtn:'เปลี่ยนไฟล์',btnText:'ยืนยันการโอนเงิน',errNickname:'กรุณากรอกชื่อเล่นก่อนนะคะ',errSide:'กรุณาเลือกว่ามาในฝ่ายไหนนะคะ',errSlip:'กรุณาอัปโหลดสลิปโอนเงินด้วยนะคะ',errSize:'ไฟล์ใหญ่เกิน 5MB กรุณาเลือกรูปใหม่ค่ะ',errServer:'เกิดข้อผิดพลาด กรุณาลองอีกครั้งค่ะ 🙏',tyTitle:'ขอบคุณ',tySub:'ได้รับสลิปเรียบร้อยแล้วค่ะ<br>ขอบคุณสำหรับความรักและน้ำใจ<br>เจอกันในงานเร็วๆ นี้เลย ✨'},
  en:{langBtn:'TH',taskTitle:'Transfer Notification',taskSub:'July 3, 2026 · Chatrium Hotel Riverside Bangkok',lNickname:'Your Nickname',placeholder:'Enter your nickname',lSide:"I'm a guest of",descBride:"Bride's",descGroom:"Groom's",lSlip:'Upload Transfer Slip',uploadPrimary:'Upload Transfer Slip',uploadSecondary:'Drag & drop or tap to browse',changeBtn:'Change file',btnText:'Confirm Transfer',errNickname:'Please enter your nickname.',errSide:"Please select which side you're from.",errSlip:'Please upload your transfer slip.',errSize:'File exceeds 5MB. Please choose a smaller image.',errServer:'Something went wrong. Please try again. 🙏',tyTitle:'Thank You',tySub:"Your slip has been received!<br>We truly appreciate your kindness.<br>See you at the wedding! ✨"}
};
let lang='th';
function applyLang(){
  const t=T[lang];
  q('langBtn').textContent=t.langBtn;
  q('taskTitle').textContent=t.taskTitle;
  q('taskSub').textContent=t.taskSub;
  q('lNickname').textContent=t.lNickname;
  q('nickname').placeholder=t.placeholder;
  q('lSide').textContent=t.lSide;
  q('descBride').textContent=t.descBride;
  q('descGroom').textContent=t.descGroom;
  q('lSlip').textContent=t.lSlip;
  q('uploadPrimary').textContent=t.uploadPrimary;
  q('uploadSecondary').textContent=t.uploadSecondary;
  q('changeBtn').textContent=t.changeBtn;
  q('btnText').textContent=t.btnText;
  q('tyTitle').textContent=t.tyTitle;
  q('tySub').innerHTML=t.tySub;
}
function toggleLang(){lang=lang==='th'?'en':'th';applyLang();}
applyLang();

function q(id){return document.getElementById(id)}
function fmt(b){return b<1024*1024?(b/1024).toFixed(0)+' KB':(b/(1024*1024)).toFixed(1)+' MB';}
function showErr(id,msg){const el=q(id);el.textContent=msg;el.classList.remove('hidden');el.classList.add('flex');}
function hideErr(id){const el=q(id);el.classList.add('hidden');el.classList.remove('flex');}

let slipDataUrl=null,slipMime=null,lineProfile=null;

function bestNickname(name){
  return String(name||'').trim().split(/\s+/)[0].slice(0,50);
}

async function initSlipLIFF(){
  if(!window.liff) return;
  try{
    await liff.init({liffId:LIFF_ID});
    if(!liff.isLoggedIn()){liff.login();return;}
    lineProfile=await liff.getProfile();
    const nickname=q('nickname');
    if(nickname && !nickname.value.trim()){
      nickname.value=bestNickname(lineProfile.displayName);
    }
  }catch(error){
    console.warn('LIFF init error',error);
  }
}

function loadFile(file){
  if(!file)return;
  if(file.size>MAX_SIZE){showErr('slipErr',T[lang].errSize);return;}
  hideErr('slipErr');
  const reader=new FileReader();
  reader.onload=e=>{
    slipDataUrl=e.target.result;slipMime=file.type||'image/jpeg';
    q('previewName').textContent=file.name;
    q('previewSize').textContent=fmt(file.size);
    q('uploadZone').style.display='none';
    const pi=q('previewInfo');pi.classList.remove('hidden');pi.classList.add('flex');
  };
  reader.readAsDataURL(file);
}

q('slipFile').addEventListener('change',()=>loadFile(q('slipFile').files[0]));

const uz=q('uploadZone');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.style.background='rgba(184,150,90,.05)';});
uz.addEventListener('dragleave',()=>uz.style.background='');
uz.addEventListener('drop',e=>{
  e.preventDefault();uz.style.background='';
  const f=e.dataTransfer?.files?.[0];if(f)loadFile(f);
});

q('changeBtn').addEventListener('click',()=>{
  slipDataUrl=null;slipMime=null;q('slipFile').value='';
  const pi=q('previewInfo');pi.classList.add('hidden');pi.classList.remove('flex');
  q('uploadZone').style.display='';
});

q('submitBtn').addEventListener('click',async()=>{
  const t=T[lang];let ok=true;
  if(!q('nickname').value.trim()){showErr('nicknameErr',t.errNickname);ok=false;}else hideErr('nicknameErr');
  const side=document.querySelector('input[name="side"]:checked')?.value;
  if(!side){showErr('sideErr',t.errSide);ok=false;}else hideErr('sideErr');
  if(!slipDataUrl){showErr('slipErr',t.errSlip);ok=false;}else hideErr('slipErr');
  if(!ok)return;

  const btn=q('submitBtn');
  btn.disabled=true;q('btnText').classList.add('hidden');q('btnSpinner').classList.remove('hidden');
  hideErr('submitErr');

  try{
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        nickname:q('nickname').value.trim(),
        side,
        slipBase64:slipDataUrl.split(',')[1],
        slipMime,
        lineUserId:lineProfile?.userId||'',
        displayName:lineProfile?.displayName||'',
        pictureUrl:lineProfile?.pictureUrl||''
      })});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const json=await res.json();
    if(!json.success)throw new Error(json.error||'error');
    // show thank you
    ['lNickname','nickname','nicknameErr','lSide','sideErr','lSlip','uploadZone','previewInfo','slipErr','submitErr'].forEach(id=>{
      const el=q(id); if(el){el.style.display='none';}
    });
    document.querySelectorAll('input[name="side"]').forEach(el=>el.closest('label').style.display='none');
    document.querySelector('.border-t').style.display='none';
    btn.style.display='none';
    const ty=q('thankYou');ty.classList.remove('hidden');ty.classList.add('flex');
  }catch(e){
    console.error(e);showErr('submitErr',T[lang].errServer);
    btn.disabled=false;q('btnText').classList.remove('hidden');q('btnSpinner').classList.add('hidden');
  }
});
initSlipLIFF();
</script>
</body>
</html>
