<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>แจ้งการโอนเงิน — An-An & Ong</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Corinthia';src:url('Wedding%20Card/Fonts/Corinthia-Regular.ttf') format('truetype');font-weight:400;font-display:swap}
@font-face{font-family:'BodoniModa';src:url('Wedding%20Card/Fonts/BodoniModa_9pt-Medium.ttf') format('truetype');font-weight:500;font-display:swap}
@font-face{font-family:'BodoniModa';src:url('Wedding%20Card/Fonts/BodoniModa_9pt-SemiBold.ttf') format('truetype');font-weight:600;font-display:swap}
@font-face{font-family:'ElmsSans';src:url('Wedding%20Card/Fonts/ElmsSans-Regular.ttf') format('truetype');font-weight:400;font-display:swap}

:root{
  --ivory:#F8F5F0;--cream:#F2EDE6;--card:#FDFAF6;
  --gold:#B8965A;--gold-dark:#9A7840;--gold-light:#D4AF78;--gold-pale:#EFE0C0;
  --text:#2C2318;--muted:#8A7560;--border:#DDD0BB;
  --shadow:rgba(44,35,24,0.10);--success:#5A8A5A;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh}
body{
  background:var(--ivory);
  font-family:'Noto Sans Thai','Sarabun',sans-serif;
  color:var(--text);
  display:flex;flex-direction:column;align-items:center;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%,rgba(184,150,90,.09) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 100%,rgba(184,150,90,.05) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

.wrap{
  position:relative;z-index:1;
  width:100%;max-width:420px;height:100%;
  display:flex;flex-direction:column;
  padding:
    max(10px,env(safe-area-inset-top))
    18px
    max(10px,env(safe-area-inset-bottom));
  gap:10px;
}

/* ── Header: minimal, task-first ── */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.brand{display:flex;align-items:center;gap:7px}
.brand-logo{height:26px;width:auto;display:block;opacity:.8}
.brand-name{
  font-family:'Corinthia',cursive;
  font-size:20px;line-height:1.3;color:var(--muted);
}
.lang-btn{
  background:transparent;border:1.5px solid var(--border);
  border-radius:50px;padding:4px 12px;
  font-family:'ElmsSans',sans-serif;
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);cursor:pointer;transition:border-color .2s,color .2s;
}
.lang-btn:hover{border-color:var(--gold);color:var(--gold)}

/* Task title */
.task-head{flex-shrink:0}
.task-title{
  font-family:'BodoniModa',serif;font-weight:600;
  font-size:24px;letter-spacing:.3px;color:var(--text);
  line-height:1.2;margin-bottom:2px;
}
.task-sub{
  font-family:'ElmsSans',sans-serif;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);
}

/* ── Card ── */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:18px 18px 20px;
  box-shadow:0 4px 20px var(--shadow);
  position:relative;overflow:hidden;
  flex-shrink:0;
  display:flex;flex-direction:column;gap:14px;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2.5px;
  background:linear-gradient(90deg,transparent 5%,var(--gold-light) 30%,var(--gold) 50%,var(--gold-light) 70%,transparent 95%);
}

/* ── Field label 14px ── */
.field-label{
  display:block;
  font-family:'Noto Sans Thai','Sarabun',sans-serif;
  font-size:14px;font-weight:600;color:var(--text);
  margin-bottom:7px;
}

/* ── Nickname ── */
.field input[type="text"]{
  width:100%;padding:11px 14px;
  background:var(--ivory);border:1.5px solid var(--border);border-radius:10px;
  font-family:'Noto Sans Thai','Sarabun',sans-serif;
  font-size:15px;color:var(--text);
  outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;
}
.field input[type="text"]:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,150,90,.12)}
.field input[type="text"]::placeholder{color:var(--border)}

/* ── Side selector ── */
.side-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.side-option{position:relative}
.side-option input[type="radio"]{position:absolute;opacity:0;width:0;height:0}
.side-option label{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border:1.5px solid var(--border);border-radius:10px;
  background:var(--ivory);cursor:pointer;user-select:none;
  transition:border-color .2s,background .2s,box-shadow .2s;
  position:relative;
}
.side-emoji{font-size:20px;line-height:1;flex-shrink:0}
.side-name{font-family:'BodoniModa',serif;font-size:14px;font-weight:500;color:var(--text);display:block}
.side-desc{font-family:'ElmsSans',sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block}
.side-check{
  display:none;position:absolute;top:6px;right:8px;
  width:16px;height:16px;border-radius:50%;
  background:var(--gold);
  align-items:center;justify-content:center;
  font-size:9px;color:#fff;line-height:1;
}
.side-option input[type="radio"]:checked+label{border-color:var(--gold);background:rgba(184,150,90,.08);box-shadow:0 0 0 3px rgba(184,150,90,.14)}
.side-option input[type="radio"]:checked+label .side-name{color:var(--gold)}
.side-option input[type="radio"]:checked+label .side-check{display:flex}

/* ── Divider between fields and upload ── */
.section-divider{
  display:flex;align-items:center;gap:8px;
  color:var(--gold-pale);font-size:10px;margin:-4px 0;
}
.section-divider::before,.section-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}

/* ── Upload zone: fixed 240px ── */
.upload-zone{
  height:240px;
  border:2px dashed var(--border);border-radius:12px;
  background:var(--ivory);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;cursor:pointer;
  transition:border-color .25s,background .25s,box-shadow .25s;
  position:relative;overflow:hidden;
}
.upload-zone:hover,.upload-zone.dragover{
  border-color:var(--gold);background:rgba(184,150,90,.05);
  box-shadow:0 0 0 3px rgba(184,150,90,.10);
}
.upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:36px;line-height:1}
.upload-primary{font-size:15px;font-weight:600;color:var(--text)}
.upload-secondary{font-size:13px;color:var(--muted);text-align:center;line-height:1.5}
.upload-hint{
  font-family:'ElmsSans',sans-serif;
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--border);
}

/* ── Preview after upload ── */
.preview-info{
  display:none;height:240px;
  border:1.5px solid rgba(90,138,90,.35);border-radius:12px;
  background:rgba(90,138,90,.05);
  flex-direction:column;align-items:center;justify-content:center;gap:8px;
}
.preview-info.show{display:flex}
.preview-check{font-size:34px;line-height:1}
.preview-name{font-size:14px;font-weight:600;color:var(--success);max-width:240px;text-align:center;word-break:break-all}
.preview-size{font-size:12px;color:var(--muted)}
.preview-change{
  font-family:'ElmsSans',sans-serif;
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--gold);border:none;background:transparent;
  cursor:pointer;text-decoration:underline;text-underline-offset:3px;
  padding:4px;
}

/* ── Error ── */
.error-msg{
  font-size:13px;color:#c0392b;margin-top:5px;
  padding:6px 12px;background:rgba(192,57,43,.07);
  border-radius:8px;display:none;
}
.error-msg.show{display:block}

/* ── CTA ── */
.submit-btn{
  width:100%;padding:16px;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold-dark) 100%);
  border:none;border-radius:14px;
  font-family:'Noto Sans Thai','Sarabun',sans-serif;
  font-size:16px;font-weight:600;
  color:#fff;cursor:pointer;
  box-shadow:0 6px 20px rgba(154,120,64,.45),0 2px 6px rgba(154,120,64,.25);
  transition:opacity .2s,transform .15s,box-shadow .2s;
}
.submit-btn:hover:not(:disabled){opacity:.93;transform:translateY(-2px);box-shadow:0 8px 24px rgba(154,120,64,.5)}
.submit-btn:active:not(:disabled){transform:translateY(0)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.btn-spinner{
  display:none;width:18px;height:18px;
  border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;
}
.submit-btn.loading .btn-text{display:none}
.submit-btn.loading .btn-spinner{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Thank you ── */
.thankyou-screen{
  display:none;flex:1;min-height:0;
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:20px;
}
.thankyou-screen.show{display:flex}
.ty-icon{font-size:52px;margin-bottom:14px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes popIn{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.ty-title{font-family:'Corinthia',cursive;font-size:62px;color:var(--text);line-height:1.1;margin-bottom:10px;animation:fadeUp .5s .2s both}
.ty-sub{font-size:15px;color:var(--muted);line-height:1.8;animation:fadeUp .5s .35s both}
.ty-names{font-family:'Corinthia',cursive;font-size:38px;color:var(--gold);margin-top:14px;animation:fadeUp .5s .5s both}
@keyframes fadeUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>
<div class="wrap">

  <!-- Header: minimal -->
  <div class="top-bar">
    <div class="brand">
      <img class="brand-logo" src="img/Wedding_Logo.png" alt="" onerror="this.style.display='none'">
      <span class="brand-name">An-An &amp; Ong</span>
    </div>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
  </div>

  <div class="task-head">
    <div class="task-title" id="taskTitle">แจ้งการโอนเงิน</div>
    <div class="task-sub" id="taskSub">July 3, 2026 · Chatrium Hotel Riverside Bangkok</div>
  </div>

  <!-- Form card -->
  <div class="card" id="formCard">

    <!-- 1. ชื่อเล่น -->
    <div class="field" id="fNickname">
      <label class="field-label" id="lNickname">ชื่อเล่นของคุณ</label>
      <input type="text" id="nickname" placeholder="กรอกชื่อเล่น" autocomplete="off" maxlength="50">
      <div class="error-msg" id="nicknameErr"></div>
    </div>

    <!-- 2. เลือกฝั่ง -->
    <div class="field" id="fSide">
      <label class="field-label" id="lSide">คุณเป็นแขกฝ่าย</label>
      <div class="side-grid">
        <div class="side-option">
          <input type="radio" id="sideBride" name="side" value="bride">
          <label for="sideBride">
            <span class="side-emoji">👰</span>
            <span><span class="side-name">An-An</span><span class="side-desc" id="descBride">เจ้าสาว</span></span>
            <span class="side-check">✓</span>
          </label>
        </div>
        <div class="side-option">
          <input type="radio" id="sideGroom" name="side" value="groom">
          <label for="sideGroom">
            <span class="side-emoji">🤵</span>
            <span><span class="side-name">Ong</span><span class="side-desc" id="descGroom">เจ้าบ่าว</span></span>
            <span class="side-check">✓</span>
          </label>
        </div>
      </div>
      <div class="error-msg" id="sideErr"></div>
    </div>

    <!-- divider -->
    <div class="section-divider"></div>

    <!-- 3. Upload slip -->
    <div class="field" id="fSlip">
      <label class="field-label" id="lSlip">อัปโหลดสลิปโอนเงิน</label>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="slipFile" accept="image/*">
        <span class="upload-icon">📤</span>
        <div class="upload-primary" id="uploadPrimary">อัปโหลดสลิปการโอนเงิน</div>
        <div class="upload-secondary" id="uploadSecondary">ลากไฟล์มาวาง หรือกดเลือกไฟล์</div>
        <div class="upload-hint">JPG · PNG · สูงสุด 5MB</div>
      </div>
      <div class="preview-info" id="previewInfo">
        <div class="preview-check">✅</div>
        <div class="preview-name" id="previewName">—</div>
        <div class="preview-size" id="previewSize">—</div>
        <button class="preview-change" id="changeBtn" type="button">เปลี่ยนไฟล์</button>
      </div>
      <div class="error-msg" id="slipErr"></div>
    </div>

    <div class="error-msg" id="submitErr"></div>

    <!-- Thank you (replaces card content) -->
    <div class="thankyou-screen" id="thankYou">
      <div class="ty-icon">💌</div>
      <div class="ty-title" id="tyTitle">ขอบคุณ</div>
      <div class="ty-sub" id="tySub">ได้รับสลิปเรียบร้อยแล้วค่ะ<br>ขอบคุณสำหรับความรักและน้ำใจ<br>เจอกันในงานเร็วๆ นี้เลย ✨</div>
      <div class="ty-names">An-An &amp; Ong</div>
    </div>
  </div>

  <!-- CTA -->
  <button class="submit-btn" id="submitBtn" type="button">
    <span class="btn-text" id="btnText">ยืนยันการโอนเงิน</span>
    <span class="btn-spinner"></span>
  </button>

</div>
<script>
const API='https://sparkth-production.up.railway.app/slip';
const MAX_SIZE=5*1024*1024;
const T={
  th:{langBtn:'EN',taskTitle:'แจ้งการโอนเงิน',taskSub:'July 3, 2026 · Chatrium Hotel Riverside Bangkok',lNickname:'ชื่อเล่นของคุณ',placeholder:'กรอกชื่อเล่น',lSide:'คุณเป็นแขกฝ่าย',descBride:'เจ้าสาว',descGroom:'เจ้าบ่าว',lSlip:'อัปโหลดสลิปโอนเงิน',uploadPrimary:'อัปโหลดสลิปการโอนเงิน',uploadSecondary:'ลากไฟล์มาวาง หรือกดเลือกไฟล์',changeBtn:'เปลี่ยนไฟล์',btnText:'ยืนยันการโอนเงิน',errNickname:'กรุณากรอกชื่อเล่นก่อนนะคะ',errSide:'กรุณาเลือกว่ามาในฝ่ายไหนนะคะ',errSlip:'กรุณาอัปโหลดสลิปโอนเงินด้วยนะคะ',errSize:'ไฟล์ใหญ่เกิน 5MB กรุณาเลือกรูปใหม่ค่ะ',errServer:'เกิดข้อผิดพลาด กรุณาลองอีกครั้งค่ะ 🙏',tyTitle:'ขอบคุณ',tySub:'ได้รับสลิปเรียบร้อยแล้วค่ะ<br>ขอบคุณสำหรับความรักและน้ำใจ<br>เจอกันในงานเร็วๆ นี้เลย ✨'},
  en:{langBtn:'TH',taskTitle:'Transfer Notification',taskSub:'July 3, 2026 · Chatrium Hotel Riverside Bangkok',lNickname:'Your Nickname',placeholder:'Enter your nickname',lSide:"I'm a guest of",descBride:"Bride's",descGroom:"Groom's",lSlip:'Upload Transfer Slip',uploadPrimary:'Upload Transfer Slip',uploadSecondary:'Drag & drop or tap to browse',changeBtn:'Change file',btnText:'Confirm Transfer',errNickname:'Please enter your nickname.',errSide:"Please select which side you're from.",errSlip:'Please upload your transfer slip.',errSize:'File exceeds 5MB. Please choose a smaller image.',errServer:'Something went wrong. Please try again. 🙏',tyTitle:'Thank You',tySub:"Your slip has been received!<br>We truly appreciate your kindness.<br>See you at the wedding! ✨"}
};
let lang='th';
function applyLang(){
  const t=T[lang];
  document.getElementById('langBtn').textContent=t.langBtn;
  document.getElementById('taskTitle').textContent=t.taskTitle;
  document.getElementById('taskSub').textContent=t.taskSub;
  document.getElementById('lNickname').textContent=t.lNickname;
  document.getElementById('nickname').placeholder=t.placeholder;
  document.getElementById('lSide').textContent=t.lSide;
  document.getElementById('descBride').textContent=t.descBride;
  document.getElementById('descGroom').textContent=t.descGroom;
  document.getElementById('lSlip').textContent=t.lSlip;
  document.getElementById('uploadPrimary').textContent=t.uploadPrimary;
  document.getElementById('uploadSecondary').textContent=t.uploadSecondary;
  document.getElementById('changeBtn').textContent=t.changeBtn;
  document.getElementById('btnText').textContent=t.btnText;
  document.getElementById('tyTitle').textContent=t.tyTitle;
  document.getElementById('tySub').innerHTML=t.tySub;
}
function toggleLang(){lang=lang==='th'?'en':'th';applyLang();}
applyLang();

const nicknameEl  = document.getElementById('nickname');
const slipFileEl  = document.getElementById('slipFile');
const uploadZone  = document.getElementById('uploadZone');
const previewInfo = document.getElementById('previewInfo');
const previewName = document.getElementById('previewName');
const previewSize = document.getElementById('previewSize');
const changeBtn   = document.getElementById('changeBtn');
const submitBtn   = document.getElementById('submitBtn');
const formCard    = document.getElementById('formCard');
const thankYou    = document.getElementById('thankYou');
const nicknameErr = document.getElementById('nicknameErr');
const sideErr     = document.getElementById('sideErr');
const slipErr     = document.getElementById('slipErr');
const submitErr   = document.getElementById('submitErr');
let slipDataUrl=null,slipMime=null;

function formatBytes(b){return b<1024*1024?(b/1024).toFixed(0)+' KB':(b/(1024*1024)).toFixed(1)+' MB';}

function loadFile(file){
  if(!file)return;
  if(file.size>MAX_SIZE){showErr(slipErr,T[lang].errSize);return;}
  hideErr(slipErr);
  const reader=new FileReader();
  reader.onload=e=>{
    slipDataUrl=e.target.result;slipMime=file.type||'image/jpeg';
    previewName.textContent=file.name;
    previewSize.textContent=formatBytes(file.size);
    uploadZone.style.display='none';
    previewInfo.classList.add('show');
  };
  reader.readAsDataURL(file);
}
slipFileEl.addEventListener('change',()=>loadFile(slipFileEl.files[0]));
uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('dragover');});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop',e=>{
  e.preventDefault();uploadZone.classList.remove('dragover');
  const file=e.dataTransfer?.files?.[0];if(file)loadFile(file);
});
changeBtn.addEventListener('click',()=>{
  slipDataUrl=null;slipMime=null;slipFileEl.value='';
  previewInfo.classList.remove('show');uploadZone.style.display='';
});

submitBtn.addEventListener('click',async()=>{
  const t=T[lang];let valid=true;
  if(!nicknameEl.value.trim()){showErr(nicknameErr,t.errNickname);valid=false;}else hideErr(nicknameErr);
  const side=document.querySelector('input[name="side"]:checked')?.value;
  if(!side){showErr(sideErr,t.errSide);valid=false;}else hideErr(sideErr);
  if(!slipDataUrl){showErr(slipErr,t.errSlip);valid=false;}else hideErr(slipErr);
  if(!valid)return;
  setLoading(true);hideErr(submitErr);
  try{
    const base64=slipDataUrl.split(',')[1];
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({nickname:nicknameEl.value.trim(),side,slipBase64:base64,slipMime})});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const json=await res.json();
    if(!json.success)throw new Error(json.error||'server error');
    ['fNickname','fSide','fSlip','submitErr'].forEach(id=>{
      const el=document.getElementById(id);if(el)el.style.display='none';
    });
    document.querySelector('.section-divider').style.display='none';
    submitBtn.style.display='none';
    thankYou.classList.add('show');
  }catch(err){console.error(err);showErr(submitErr,T[lang].errServer);}
  finally{setLoading(false);}
});

function setLoading(on){submitBtn.disabled=on;submitBtn.classList.toggle('loading',on);}
function showErr(el,msg){if(msg)el.textContent=msg;el.classList.add('show');}
function hideErr(el){el.classList.remove('show');}
</script>
</body>
</html>
