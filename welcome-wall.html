<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Wall - Pattaraporn & Praphat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FEFCFB;
  --blush:#FDE8EC;
  --rose:#D97E88;
  --peach:#C9917A;
  --sage:#F2C4CE;
  --sky:#E8B4BC;
  --text:#3D2428;
  --muted:#A07878;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden}
body{
  font-family:'Noto Sans Thai',sans-serif;
  color:var(--cream);
  background:
    radial-gradient(circle at 20% 18%, rgba(220,120,140,.35), transparent 30%),
    radial-gradient(circle at 84% 72%, rgba(195,135,110,.30), transparent 32%),
    linear-gradient(135deg,#2d1e23,#643c44 42%,#3a2328);
}
.bg-video{
  position:fixed;inset:0;width:100%;height:100%;
  object-fit:cover;z-index:0;opacity:.92;
}
.shade{
  position:fixed;inset:0;z-index:1;
  background:
    radial-gradient(circle at center, rgba(0,0,0,.05), rgba(0,0,0,.42)),
    linear-gradient(180deg,rgba(0,0,0,.24),rgba(0,0,0,.08) 42%,rgba(0,0,0,.36));
  pointer-events:none;
}
.stage{position:fixed;inset:0;z-index:2;overflow:hidden}
.title{
  position:fixed;left:50%;top:42px;z-index:4;
  transform:translateX(-50%);
  text-align:center;text-shadow:0 8px 28px rgba(0,0,0,.42);
  pointer-events:none;
}
.eyebrow{
  display:block;font-size:13px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(254,252,251,.82);font-weight:700;
}
.couple{
  display:block;font-family:'Playfair Display',serif;font-size:clamp(34px,5vw,70px);
  line-height:1.05;font-weight:700;margin-top:5px;
}
.subtitle{
  display:block;font-size:clamp(16px,2vw,26px);font-weight:300;margin-top:8px;
  color:rgba(254,252,251,.92);
}
.spotlight{
  position:fixed;left:50%;bottom:54px;z-index:4;
  transform:translateX(-50%);
  min-width:min(760px,78vw);
  padding:18px 30px;border-radius:999px;
  text-align:center;background:rgba(254,252,251,.16);
  border:1px solid rgba(254,252,251,.26);
  backdrop-filter:blur(16px);
  box-shadow:0 18px 70px rgba(0,0,0,.24);
  opacity:0;transition:opacity .35s ease, transform .35s ease;
  pointer-events:none;
}
.spotlight.on{opacity:1;transform:translateX(-50%) translateY(-6px)}
.spotlight-name{font-size:clamp(24px,3.2vw,46px);font-weight:700;line-height:1.15}
.spotlight-msg{font-size:clamp(13px,1.45vw,20px);font-weight:300;color:rgba(254,252,251,.9);margin-top:4px}
.bubble{
  position:absolute;left:0;top:0;
  width:120px;height:145px;border-radius:999px;
  transform:translate3d(0,0,0);
  filter:drop-shadow(0 16px 26px rgba(0,0,0,.24));
  will-change:transform;
}
.bubble-inner{
  position:relative;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;
}
.avatar-ring{
  width:108px;height:108px;border-radius:50%;
  padding:5px;
  background:linear-gradient(135deg,var(--blush),var(--rose),var(--sky),var(--sage));
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.2);
}
.bubble.single .avatar-ring{
  background:linear-gradient(135deg,#FDE8EC,#D97E88,#B8965A,#E8B4BC);
  box-shadow:0 0 0 4px rgba(255,255,255,.22),0 0 34px rgba(217,126,136,.38);
}
.bubble.frame-bride .avatar-ring{
  background:linear-gradient(135deg,#FDE8EC,#F59C9A,#FFBE98,#FDE8EC);
}
.bubble.frame-groom .avatar-ring{
  background:linear-gradient(135deg,#E8F3FF,#9ECCF0,#C5DBA9,#FEFCFB);
}
.bubble.frame-lucky .avatar-ring{
  background:linear-gradient(135deg,#FFE7AB,#C5DBA9,#9ECCF0,#F59C9A);
  box-shadow:0 0 0 4px rgba(255,255,255,.18),0 0 30px rgba(255,231,171,.32);
}
.avatar-img,.avatar-fallback{
  width:100%;height:100%;border-radius:50%;
  object-fit:cover;border:3px solid rgba(254,252,251,.92);
  background:rgba(254,252,251,.9);
}
.avatar-fallback{
  display:flex;align-items:center;justify-content:center;
  color:var(--text);font-size:34px;font-weight:700;
}
.bubble-label{
  max-width:160px;margin-top:7px;padding:6px 11px;border-radius:999px;
  color:var(--text);background:rgba(254,252,251,.9);
  border:1px solid rgba(245,200,196,.7);
  font-size:14px;font-weight:700;line-height:1.25;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}
.single-badge{
  position:absolute;right:2px;top:76px;
  border-radius:999px;padding:4px 7px;
  background:rgba(184,150,90,.94);color:white;
  border:1px solid rgba(255,255,255,.7);
  font-size:10px;font-weight:800;letter-spacing:.2px;
  box-shadow:0 8px 18px rgba(0,0,0,.18);
}
.bubble-ig{
  display:block;text-decoration:none;
  max-width:150px;margin-top:4px;padding:3px 8px;border-radius:999px;
  color:white;background:rgba(61,36,40,.62);border:1px solid rgba(255,255,255,.18);
  font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.bubble-ig:hover{background:rgba(61,36,40,.82)}
.bubble.new .avatar-ring{animation:pop .85s cubic-bezier(.2,1.4,.35,1)}
.bubble.new .bubble-label{animation:labelPop .9s cubic-bezier(.2,1.4,.35,1)}
@keyframes pop{
  0%{transform:scale(.2);opacity:0}
  60%{transform:scale(1.15);opacity:1}
  100%{transform:scale(1)}
}
@keyframes labelPop{
  0%,25%{transform:translateY(8px);opacity:0}
  100%{transform:translateY(0);opacity:1}
}
.controls{
  position:fixed;right:20px;top:18px;z-index:10;
  display:flex;gap:8px;align-items:center;
}
.control-btn{
  appearance:none;border:1px solid rgba(254,252,251,.35);
  background:rgba(254,252,251,.16);color:white;
  border-radius:999px;padding:9px 14px;
  font-family:inherit;font-size:13px;font-weight:700;
  cursor:pointer;backdrop-filter:blur(14px);
}
.status{
  position:fixed;left:20px;bottom:18px;z-index:10;
  color:rgba(254,252,251,.76);font-size:12px;
  background:rgba(0,0,0,.18);border-radius:999px;
  padding:8px 12px;backdrop-filter:blur(10px);
}
@media(max-width:720px){
  .title{top:28px}.spotlight{bottom:30px;min-width:88vw}
  .bubble{width:94px;height:120px}.avatar-ring{width:86px;height:86px}
  .bubble-label{font-size:12px;max-width:120px}
}
</style>
</head>
<body>
<video class="bg-video" id="bgVideo" autoplay muted loop playsinline preload="auto">
  <source src="weddingBg/scene1-bg.mp4" type="video/mp4">
</video>
<div class="shade"></div>
<main class="stage" id="stage" aria-live="polite">
  <header class="title">
    <span class="eyebrow">Wedding Welcome</span>
    <span class="couple">Pattaraporn &amp; Praphat</span>
    <span class="subtitle">3 July 2026 · Chatrium Riverside Bangkok</span>
  </header>
  <section class="spotlight" id="spotlight">
    <div class="spotlight-name" id="spotlightName">Welcome</div>
    <div class="spotlight-msg" id="spotlightMsg">สู่งานแต่งงานของอันอันและอ๋องครับ</div>
  </section>
</main>
<div class="controls">
  <button class="control-btn" id="soundBtn" type="button">เปิดเสียง</button>
  <button class="control-btn" id="testBtn" type="button">Test</button>
  <button class="control-btn" id="resetBtn" type="button" style="background:rgba(255,100,80,.22);border-color:rgba(255,120,100,.45)">Reset</button>
</div>
<div class="status" id="status">Connecting...</div>

<script>
const API_URL = (localStorage.getItem('weddingApiUrl') || 'https://sparkth-production.up.railway.app/rsvp').replace(/\/rsvp$/, '');
const stage = document.getElementById('stage');
const statusEl = document.getElementById('status');
const bgVideo = document.getElementById('bgVideo');
const spotlight = document.getElementById('spotlight');
const spotlightName = document.getElementById('spotlightName');
const spotlightMsg = document.getElementById('spotlightMsg');
const bubbles = new Map();
let soundEnabled = false;
let spotlightTimer = null;
const SPEECH_DELAY_MS = Number(localStorage.getItem('welcomeSpeechDelayMs') || 1500);
const SPEECH_MAX_NAMES = Number(localStorage.getItem('welcomeSpeechMaxNames') || 6);
const speechQueue = new Map();
let speechTimer = null;

function playBackgroundVideo(){
  if(!bgVideo) return;
  bgVideo.muted = true;
  bgVideo.loop = true;
  bgVideo.playsInline = true;
  const playAttempt = bgVideo.play();
  if(playAttempt && typeof playAttempt.catch === 'function'){
    playAttempt.catch(() => setTimeout(playBackgroundVideo, 1200));
  }
}

bgVideo.addEventListener('loadeddata', playBackgroundVideo);
bgVideo.addEventListener('canplay', playBackgroundVideo);
document.addEventListener('visibilitychange', () => {
  if(!document.hidden) playBackgroundVideo();
});
playBackgroundVideo();

document.getElementById('soundBtn').addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  document.getElementById('soundBtn').textContent = soundEnabled ? 'ปิดเสียง' : 'เปิดเสียง';
  if(soundEnabled) speak('ระบบเสียงพร้อมแล้วครับ');
});

document.getElementById('resetBtn').addEventListener('click', () => {
  for(const bubble of bubbles.values()) bubble.el.remove();
  bubbles.clear();
  speechQueue.clear();
  clearTimeout(speechTimer);
  spotlight.classList.remove('on');
  clearTimeout(spotlightTimer);
  statusEl.textContent = 'Cleared';
  setTimeout(() => { statusEl.textContent = 'Live'; }, 2000);
});

let _rsvpCache = null;
async function getRsvpSamples(){
  if(_rsvpCache) return _rsvpCache;
  try{
    const res = await fetch(`${API_URL}/rsvp?action=list`);
    const data = await res.json();
    const all = [...(data.submitted||[]), ...(data.visited||[])].filter(r => r.photo || r.pictureUrl);
    _rsvpCache = all.length ? all : null;
  }catch(_){}
  return _rsvpCache;
}

document.getElementById('testBtn').addEventListener('click', async () => {
  const samples = await getRsvpSamples();
  let sample;
  if(samples && samples.length){
    const r = samples[Math.floor(Math.random() * samples.length)];
    sample = {
      displayName: r.nickName || r.nickname || r.name || 'Guest',
      nickname: r.nickName || r.nickname || r.name || 'Guest',
      pictureUrl: r.photo || r.pictureUrl || ''
    };
  } else {
    const fallbacks = [
      { displayName:'พงพงศ์', nickname:'พงพงศ์' },
      { displayName:'อันอัน', nickname:'อันอัน' },
      { displayName:'อ๋อง', nickname:'อ๋อง' },
      { displayName:'Guest', nickname:'Guest' }
    ];
    sample = fallbacks[Math.floor(Math.random() * fallbacks.length)];
  }
  makeBubble({
    ...sample,
    lineUserId:`local_test_${Date.now()}_${Math.random().toString(16).slice(2)}`,
    source:'screen-test'
  }, true);
});

function displayNameOf(data){
  return (data.nickName || data.nickname || data.displayName || 'Guest').trim();
}

function initials(name){
  return (name || 'G').trim().slice(0,2).toUpperCase();
}

function makeBubble(data, isNew=false){
  const id = data.lineUserId || `guest_${data.id || Date.now()}`;
  const name = displayNameOf(data);
  const isSingle = Boolean(data.isSingle || data.is_single);
  const rawFrame = (data.wallFrame || data.wall_frame || (isSingle ? 'single' : 'classic')).trim();
  const frame = ['classic','single','bride','groom','lucky'].includes(rawFrame) ? rawFrame : 'classic';
  const instagram = (data.instagram || '').trim().replace(/^@+/, '');
  const showIg = Boolean(data.showSocialOnWall || data.show_social_on_wall) && instagram;
  const instagramUrl = showIg ? `https://instagram.com/${encodeURIComponent(instagram)}` : '';
  if(bubbles.has(id)){
    const existing = bubbles.get(id);
    existing.vx += (Math.random() - .5) * 1.2;
    existing.vy += (Math.random() - .5) * 1.2;
    showSpotlight(name);
    return;
  }

  const el = document.createElement('div');
  el.className = `bubble frame-${frame}${isNew ? ' new' : ''}${isSingle || frame === 'single' ? ' single' : ''}`;
  const picture = data.pictureUrl || data.photo || '';
  el.innerHTML = `
    <div class="bubble-inner">
      <div class="avatar-ring">
        ${picture
          ? `<img class="avatar-img" src="${picture}" alt="${escapeHtml(name)}" onerror="this.replaceWith(fallbackAvatar('${escapeHtml(initials(name))}'))">`
          : `<div class="avatar-fallback">${escapeHtml(initials(name))}</div>`}
      </div>
      ${isSingle ? '<div class="single-badge">โสด</div>' : ''}
      <div class="bubble-label">${escapeHtml(name)}</div>
      ${showIg ? `<a class="bubble-ig" href="${instagramUrl}" target="_blank" rel="noopener">@${escapeHtml(instagram)}</a>` : ''}
    </div>`;
  stage.appendChild(el);

  const rect = stage.getBoundingClientRect();
  const size = window.innerWidth <= 720 ? 94 : 120;
  const bubble = {
    id, el, size,
    x: rect.width * (.38 + Math.random() * .24),
    y: rect.height * (.34 + Math.random() * .2),
    vx: (Math.random() > .5 ? 1 : -1) * (0.45 + Math.random() * 0.9),
    vy: (Math.random() > .5 ? 1 : -1) * (0.35 + Math.random() * 0.75)
  };
  bubbles.set(id, bubble);

  if(bubbles.size > 80){
    const first = bubbles.values().next().value;
    first.el.remove();
    bubbles.delete(first.id);
  }

  if(isNew){
    showSpotlight(name);
    queueWelcomeSpeech(id, name);
    setTimeout(() => el.classList.remove('new'), 1100);
  }
}

function fallbackAvatar(text){
  const div = document.createElement('div');
  div.className = 'avatar-fallback';
  div.textContent = text;
  return div;
}

function showSpotlight(name){
  spotlightName.textContent = `ยินดีต้อนรับคุณ${name}`;
  spotlightMsg.textContent = 'สู่งานแต่งงานของอันอันและอ๋องครับ';
  spotlight.classList.add('on');
  clearTimeout(spotlightTimer);
  spotlightTimer = setTimeout(() => spotlight.classList.remove('on'), 6500);
}

function speak(text){
  if(!soundEnabled || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'th-TH';
  utterance.rate = 0.86;
  utterance.pitch = 1.04;
  window.speechSynthesis.speak(utterance);
}

function queueWelcomeSpeech(id, name){
  if(!name || speechQueue.has(id)) return;
  speechQueue.set(id, {
    name,
    queuedAt: Date.now()
  });
  scheduleSpeechFlush();
}

function scheduleSpeechFlush(){
  clearTimeout(speechTimer);
  if(!speechQueue.size) return;

  const firstQueuedAt = Math.min(...Array.from(speechQueue.values(), (item) => item.queuedAt));
  const flushAt = firstQueuedAt + SPEECH_DELAY_MS;
  speechTimer = setTimeout(flushWelcomeSpeech, Math.max(0, flushAt - Date.now()));
}

function flushWelcomeSpeech(){
  if(!speechQueue.size) return;
  const ready = Array.from(speechQueue.entries(), ([id, item]) => ({ id, ...item }));
  speechQueue.clear();
  const names = Array.from(new Set(ready.map((item) => item.name))).filter(Boolean);
  if(names.length === 1){
    speak(`ยินดีต้อนรับคุณ${names[0]} สู่งานแต่งงานของอันอันและอ๋องครับ`);
  }else if(names.length <= SPEECH_MAX_NAMES){
    speak(`ขอขอบคุณ${names.map((name) => `คุณ${name}`).join(' ')} ที่มาร่วมงานแต่งงานของอันอันและอ๋องครับ`);
  }else{
    const shownNames = names.slice(0, SPEECH_MAX_NAMES).map((name) => `คุณ${name}`).join(' ');
    speak(`ขอขอบคุณ${shownNames} และแขกทุกท่าน ที่มาร่วมงานแต่งงานของอันอันและอ๋องครับ`);
  }

  scheduleSpeechFlush();
}

function escapeHtml(text){
  return String(text).replace(/[&<>"']/g, (ch) => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[ch]);
}

async function loadRecent(){
  try{
    const res = await fetch(`${API_URL}/welcome/recent?limit=34`);
    const data = await res.json();
    (data.checkins || []).forEach((item) => makeBubble(item, false));
  }catch(_error){}
}

function connectStream(){
  const stream = new EventSource(`${API_URL}/welcome-stream`);
  stream.addEventListener('open', () => { statusEl.textContent = 'Live'; });
  stream.addEventListener('ready', () => { statusEl.textContent = 'Live'; });
  stream.addEventListener('checkin', (event) => {
    try{ makeBubble(JSON.parse(event.data), true); }catch(_error){}
  });
  stream.addEventListener('error', () => {
    statusEl.textContent = 'Reconnecting...';
  });
}

function animate(){
  const width = window.innerWidth;
  const height = window.innerHeight;
  for(const bubble of bubbles.values()){
    bubble.x += bubble.vx;
    bubble.y += bubble.vy;
    const maxX = width - bubble.size;
    const maxY = height - bubble.size - 35;
    if(bubble.x < 8 || bubble.x > maxX){
      bubble.vx *= -1;
      bubble.x = Math.max(8, Math.min(maxX, bubble.x));
    }
    if(bubble.y < 112 || bubble.y > maxY){
      bubble.vy *= -1;
      bubble.y = Math.max(112, Math.min(maxY, bubble.y));
    }
    bubble.el.style.transform = `translate3d(${bubble.x}px, ${bubble.y}px, 0)`;
  }
  requestAnimationFrame(animate);
}

document.getElementById('bgVideo').addEventListener('error', () => {
  document.getElementById('bgVideo').style.display = 'none';
});

loadRecent();
connectStream();
animate();
</script>
</body>
</html>
